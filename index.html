<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>J-REIT Intelligence v0.1</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header><div><h1>J-REIT Intelligence</h1><p>公開情報分析MVP v0.1</p></div><button id="export">CSV出力</button></header>
  <main>
    <aside>
      <input id="search" type="search" placeholder="物件名・住所を検索">
      <select id="type"><option value="">すべての用途</option></select>
      <div class="summary"><b id="count">0</b><span>表示物件</span></div>
      <div id="list"></div>
    </aside>
    <section id="map"></section>
    <section id="detail" class="detail"><p class="empty">地図または一覧から物件を選択してください。</p></section>
  </main>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
