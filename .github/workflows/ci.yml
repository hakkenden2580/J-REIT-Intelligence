name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Install PDF test dependencies
        run: python3 -m pip install -r requirements-pdf.txt
      - name: Run unit tests
        run: python3 -m unittest discover -s tests -v
      - name: Enforce private-data boundary
        run: python3 scripts/check_git_boundary.py
      - name: Check JavaScript syntax
        run: |
          node --check app.js
          node --check analysis-math.js
      - name: Check Python syntax without bytecode artifacts
        run: python3 -c 'import ast,pathlib; [ast.parse(p.read_text()) for p in pathlib.Path("scripts").rglob("*.py")]'
